<div class="uk-grid-small uk-child-width-1-2@s" uk-grid>
  <div class="field">
    <label class="uk-form-label" for="id_title">Titolo</label>
    <div class="uk-form-controls">{{ form.title }}</div>
  </div>
  <div class="field">
    <label class="uk-form-label" for="id_item_type">Tipo voce</label>
    <div class="uk-form-controls">{{ form.item_type }}</div>
  </div>
  <div class="field">
    <label class="uk-form-label" for="id_due_date">Scadenza</label>
    <div class="uk-form-controls">{{ form.due_date }}</div>
  </div>
  <div class="field">
    <label class="uk-form-label" for="id_due_time">Orario (opzionale)</label>
    <div class="uk-form-controls">{{ form.due_time }}</div>
  </div>
  <div class="field">
    <label class="uk-form-label" for="id_status">Status</label>
    <div class="uk-form-controls">{{ form.status }}</div>
  </div>
  <div class="field">
    <label class="uk-form-label" for="id_priority">Priorita</label>
    <div class="uk-form-controls">{{ form.priority }}</div>
  </div>
  <div class="field">
    <label class="uk-form-label" for="id_project_choice">Progetto</label>
    <div class="uk-form-controls">{{ form.project_choice }}</div>
  </div>
  <div class="field" data-project-name-row>
    <label class="uk-form-label" for="id_project_name">Nuovo progetto (se non esiste)</label>
    <div class="uk-form-controls">{{ form.project_name }}</div>
  </div>
  <div class="field">
    <label class="uk-form-label" for="id_category_choice">Categoria</label>
    <div class="uk-form-controls">{{ form.category_choice }}</div>
  </div>
  <div class="field" data-category-name-row>
    <label class="uk-form-label" for="id_category_name">Nuova categoria (se non esiste)</label>
    <div class="uk-form-controls">{{ form.category_name }}</div>
  </div>
  <div class="field uk-width-1-1">
    <label class="uk-form-label" for="id_note">Note</label>
    <div class="uk-form-controls">{{ form.note }}</div>
  </div>
</div>
