<div
  id="routine-status-{{ item.id }}"
  class="uk-text-meta uk-margin-xsmall-top routine-entry-status"
  data-routine-status
  data-routine-status-value="{{ status }}"
  hx-swap-oob="outerHTML"
>{{ status }}</div>

{% with item_id=item.id|stringformat:"s" %}
{% with data_id="routine-data-"|add:item_id data_container_id="routine-data-container-"|add:item_id %}
<div id="{{ data_container_id }}" hidden hx-swap-oob="outerHTML">
  {{ data|default:""|json_script:data_id }}
</div>
{% endwith %}
{% endwith %}

<strong id="routine-stat-planned" data-routine-stat="PLANNED" hx-swap-oob="outerHTML">{{ stats.planned }}</strong>
<strong id="routine-stat-done" data-routine-stat="DONE" hx-swap-oob="outerHTML">{{ stats.done }}</strong>
<strong id="routine-stat-skipped" data-routine-stat="SKIPPED" hx-swap-oob="outerHTML">{{ stats.skipped }}</strong>
