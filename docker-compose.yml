x-app-image: &app-image
  image: archibald-app:latest

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mio_master}
      POSTGRES_USER: ${POSTGRES_USER:-mio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mio_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mio} -d ${POSTGRES_DB:-mio_master}"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    <<: *app-image
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_DB_SSL_REQUIRE: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-mio}:${POSTGRES_PASSWORD:-mio_password}@db:5432/${POSTGRES_DB:-mio_master}
      RADICALE_USERS_FILE: /radicale-data/users
      RADICALE_RIGHTS_FILE: /radicale-data/rights
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8000), 3); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - radicale_data:/radicale-data

  mail_worker:
    <<: *app-image
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_DB_SSL_REQUIRE: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:-mio}:${POSTGRES_PASSWORD:-mio_password}@db:5432/${POSTGRES_DB:-mio_master}
      RADICALE_USERS_FILE: /radicale-data/users
      RADICALE_RIGHTS_FILE: /radicale-data/rights
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py run_archibald_mail_worker
      --interval-seconds ${ARCHIBALD_MAIL_POLL_SECONDS:-300}
      --limit ${ARCHIBALD_MAIL_POLL_LIMIT:-0}
      --archi-fast-seconds ${ARCHIBALD_MAIL_ARCHI_FAST_POLL_SECONDS:-5}
      --archi-fast-limit ${ARCHIBALD_MAIL_ARCHI_FAST_LIMIT:-3}"
    volumes:
      - radicale_data:/radicale-data

  radicale_init:
    image: alpine:3.20
    restart: "no"
    command: >
      sh -c "mkdir -p /data/collections &&
      touch /data/users &&
      touch /data/rights &&
      chown 2999:2999 /data/users &&
      chown 2999:2999 /data/rights &&
      chmod 600 /data/users &&
      chmod 600 /data/rights"
    volumes:
      - radicale_data:/data

  radicale:
    image: tomsquest/docker-radicale:latest
    restart: unless-stopped
    depends_on:
      radicale_init:
        condition: service_completed_successfully
    ports:
      - "${RADICALE_PUBLISHED_PORT:-5232}:5232"
    volumes:
      - ./docker/radicale/config:/config/config:ro
      - radicale_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 5232), 3); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 12

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      CADDY_SITE_HOST: ${CADDY_SITE_HOST:-:80}
    depends_on:
      web:
        condition: service_healthy
      radicale:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - static_volume:/srv/static:ro
      - media_volume:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  static_volume:
  media_volume:
  radicale_data:
  caddy_data:
  caddy_config:
