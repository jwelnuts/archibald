{% load static %}
<link rel="stylesheet" href="{% static 'core/vendor/uikit/uikit.min.css' %}">
{% if ui_use_global_styles %}
  {% if less_dev_mode %}
    <link rel="stylesheet/less" type="text/css" href="{% static 'core/styles.less' %}">
    <script>
      window.less = window.less || { env: "development", async: false, fileAsync: false };
    </script>
    <script src="{% static 'core/vendor/less/less.min.js' %}"></script>
  {% else %}
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
  {% endif %}
{% endif %}
<link rel="stylesheet" href="{% static 'core/uikit_bridge.css' %}">
