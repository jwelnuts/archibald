<header class="site-header">
  <div class="sh-brand">
    <span class="sh-logo-dot">◆</span>
    <span class="sh-logo-text">MI.Organizzo</span>
    <span class="sh-sep">/</span>
    <span class="sh-module">{{ module_subtitle|default:"App" }}</span>
  </div>

  <nav class="sh-nav">
    {% for custom in site_nav.custom_links %}
      <a
        href="{{ custom.url }}"
        class="sh-link"
        {% if custom.external %}target="_blank" rel="noopener noreferrer"{% endif %}
      >{{ custom.label }}</a>
    {% endfor %}

    <div class="uk-inline">
      <button class="sh-app-btn" type="button">
        <span uk-icon="icon: {% if site_nav.selected_app %}{{ site_nav.selected_app.icon|default:'thumbnails' }}{% else %}thumbnails{% endif %}; ratio: 0.85"></span>
        <span>{% if site_nav.selected_app %}{{ site_nav.selected_app.label }}{% else %}App{% endif %}</span>
        <span class="sh-chevron" uk-icon="icon: chevron-down; ratio: 0.8"></span>
      </button>
      <div uk-dropdown="mode: click; pos: bottom-right; offset: 8; animation: uk-animation-slide-top-small; duration: 150" class="sh-dropdown">
        <div class="sh-app-grid">
          <a href="/" class="sh-app-card">
            <span uk-icon="icon: home; ratio: 1.1"></span>
            <span>Dashboard</span>
          </a>
          {% for app in site_nav.app_options %}
            <a href="{{ app.url }}" class="sh-app-card {% if site_nav.selected_app_key == app.key %}is-active{% endif %}">
              <span uk-icon="icon: {{ app.icon|default:'thumbnails' }}; ratio: 1.1"></span>
              <span>{{ app.label }}</span>
            </a>
          {% endfor %}
        </div>
      </div>
    </div>

    <a href="/accounts/logout/" class="sh-logout" title="Logout">
      <span uk-icon="icon: sign-out; ratio: 0.9"></span>
    </a>
  </nav>
</header>
