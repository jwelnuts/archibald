<li class="subproject-activity-row" id="activity-row-{{ activity.id }}">
  <div>
    <div class="project-row-title">{{ activity.title }}</div>
    <div class="uk-text-meta">
      {% if activity.due_date %}Scadenza {{ activity.due_date|date:"d/m/Y" }} · {% endif %}
      Ordine {{ activity.ordering }}
    </div>
    {% if activity.description %}
      <div class="uk-text-small uk-margin-small-top">{{ activity.description }}</div>
    {% endif %}
  </div>
  <div>
    <form method="post" class="subproject-status-form"
          hx-post="/projects/subprojects/view?id={{ subproject.id }}"
          hx-target="#activity-row-{{ activity.id }}"
          hx-swap="outerHTML">
      {% csrf_token %}
      <input type="hidden" name="action" value="update_activity_status">
      <input type="hidden" name="activity_id" value="{{ activity.id }}">
      <select name="status" class="uk-select uk-form-small">
        {% for key, label in activity_status_choices %}
          <option value="{{ key }}" {% if activity.status == key %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
      <button class="uk-button uk-button-default uk-button-small" type="submit">Aggiorna</button>
    </form>
    <form method="post" class="uk-margin-small-top"
          hx-post="/projects/subprojects/view?id={{ subproject.id }}"
          hx-target="#activity-row-{{ activity.id }}"
          hx-swap="outerHTML"
          hx-confirm="Rimuovere questa attività?">
      {% csrf_token %}
      <input type="hidden" name="action" value="remove_activity">
      <input type="hidden" name="activity_id" value="{{ activity.id }}">
      <button class="uk-button uk-button-danger uk-button-small" type="submit">Rimuovi</button>
    </form>
  </div>
</li>
